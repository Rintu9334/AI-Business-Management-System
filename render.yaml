# render.yaml — Render Blueprint
# Deploy: https://dashboard.render.com → New → Blueprint → connect this repo

services:
  # ── Django Backend ───────────────────────────────────────────────────────────
  - type: web
    name: ai-business-management-system
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput && python create_admin.py
    startCommand: gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /

    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://ai-bms-frontend.onrender.com"

  # ── React Frontend ───────────────────────────────────────────────────────────
  - type: static
    name: ai-bms-frontend
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: false

    envVars:
      - key: VITE_API_URL
        value: "https://ai-business-management-system.onrender.com/api/"

    routes:
      - type: rewrite
        source: /*
        destination: /index.html
