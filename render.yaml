# render.yaml — Render Blueprint
# Deploy: https://dashboard.render.com → New → Blueprint → connect this repo

services:
  # ── Django Backend ───────────────────────────────────────────────────────────
  - type: web
    name: ai-bms-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /

    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      # After frontend deploys, set this to your frontend Render URL:
      # e.g. https://ai-bms-frontend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: ""

  # ── React Frontend ───────────────────────────────────────────────────────────
  - type: static
    name: ai-bms-frontend
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: false

    envVars:
      # Set this to your backend Render URL BEFORE the first deploy:
      # e.g. https://ai-bms-backend.onrender.com/api/
      - key: VITE_API_URL
        value: ""

    routes:
      - type: rewrite
        source: /*
        destination: /index.html
